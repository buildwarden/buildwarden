version: 2
project_name: buildwarden
builds:
  - id: warden
    main: ./cmd/warden
    binary: warden
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
  - id: ledger-inspect
    main: ./cmd/ledger-inspect
    binary: ledger-inspect
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
archives:
  - id: default
    builds: [warden, ledger-inspect]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
  algorithm: sha256
release:
  github:
    owner: buildwarden
    name: buildwarden
