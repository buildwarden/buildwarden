version: 2
project_name: buildwarden
before:
  hooks:
    - sh -c 'GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/warden-io-linux-amd64 ./cmd/warden-io && GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/warden-io-linux-arm64 ./cmd/warden-io'
builds:
  - id: warden
    main: ./cmd/warden
    binary: warden
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - id: default
    builds: [warden]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: dist/warden-io-linux-{{ .Arch }}
        dst: warden-io
checksum:
  name_template: checksums.txt
  algorithm: sha256
signs:
  - cmd: cosign
    artifacts: checksum
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}
changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^ci"
release:
  github:
    owner: buildwarden
    name: buildwarden
