version: 2
project_name: buildwarden
builds:
  - id: warden
    main: ./cmd/warden
    binary: warden
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - id: default
    builds: [warden]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
  algorithm: sha256
signs:
  - cmd: cosign
    artifacts: checksum
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}
changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^ci"
release:
  github:
    owner: buildwarden
    name: buildwarden
