name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We welcome feature suggestions! Please describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that BuildWarden doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you think this should work? (optional — we're happy to design together)
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / UX
        - Ledger format
        - Package manager support
        - Platform / runtime support
        - Extensions
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you found a workaround, or considered other approaches?
    validations:
      required: false
